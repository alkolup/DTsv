<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f2a44" />
  <meta name="application-name" content="DigiTool" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>DigiTool</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .wrap {
      width: min(980px, 100%);
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 30px;
      color: #1f2a44;
    }
    .respondent-id {
      text-align: center;
      color: #4b5563;
      font-weight: 700;
      margin: 0 0 18px 0;
    }
    .subtitle {
      margin: 0 0 24px 0;
      text-align: center;
      color: #555;
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      border: 2px solid #d7d7d7;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .preview {
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #ccc;
    }
    .label {
      text-align: center;
      font-weight: 700;
      color: #1f2a44;
      font-size: 18px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .open-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    .open-euler { background: #2f6ea7; }
    .open-euler:hover { background: #255c8c; }
    .open-degree { background: #2b7a4b; }
    .open-degree:hover { background: #22653e; }
    .open-park { background: #15803d; }
    .open-park:hover { background: #126b33; }
    .card.locked {
      filter: grayscale(1);
      opacity: 0.7;
      border-color: #b0b0b0;
    }
    .card.locked .open-btn {
      background: #8f8f8f !important;
      cursor: not-allowed;
    }

    #intro-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 2000;
      display: none;
    }
    #ghost-ui {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 2200;
      display: flex;
      align-items: flex-end;
      transform-origin: bottom left;
      transform: scale(0.6);
      transition: transform 0.35s ease;
    }
    #ghost-character {
      text-align: center;
      animation: float 3s ease-in-out infinite;
      cursor: pointer;
      user-select: none;
    }
    #ghost-bubble {
      margin-left: -10px;
      margin-bottom: 40px;
      position: relative;
      background: #fff;
      border: 3px solid #007bff;
      border-radius: 20px;
      padding: 18px;
      min-width: 320px;
      max-width: min(420px, 90vw);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #ghost-bubble.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .ghost-text {
      font-size: 17px;
      font-weight: 700;
      color: #1f2a44;
      margin-bottom: 12px;
      text-align: center;
      line-height: 1.35;
    }
    #ghost-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ghost-btn {
      margin-top: 4px;
      padding: 10px 15px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .ghost-btn:hover { background: #0056d2; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, minmax(260px, 1fr)); }
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
    .thanks-screen {
      text-align: center;
      padding: 30px 10px 20px;
    }
    .thanks-screen h2 {
      margin: 0 0 10px 0;
      color: #1f2a44;
      font-size: 34px;
    }
    .thanks-screen p {
      margin: 0;
      color: #4b5563;
      font-size: 18px;
      line-height: 1.5;
    }
  </style>
</head>

  <script>
    const SESSION_KEY = 'digitool_active_session';
    const RESULTS_KEY = 'digitool_results';
    const ARCHIVE_KEY = 'digitool_archive';
    /** Po nasazení Google Apps Script vložte sem URL končící na /exec (viz github-a-google-disk-navod.txt). */
    const GOOGLE_DRIVE_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbx9gi3u5cOAu47tWNo0xJxDIEuqZnnUoQfjxrzjvGElu3Sol3V1yIO3C26QvNNqSStj/exec';
    
    const introOverlay = document.getElementById('intro-overlay');
    const ghostUI = document.getElementById('ghost-ui');
    const ghostCharacter = document.getElementById('ghost-character');
    const ghostBubble = document.getElementById('ghost-bubble');
    const ghostText = document.getElementById('ghost-text');
    const ghostButtons = document.getElementById('ghost-buttons');
    const respondentIdLabel = document.getElementById('respondent-id');

    const readJSON = (key, fallback) => {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
      catch (e) { return fallback; }
    };
    const writeJSON = (key, value) => localStorage.setItem(key, JSON.stringify(value));

    const uploadJsonToGoogleDrive = async (filename, jsonString) => {
      if (!GOOGLE_DRIVE_UPLOAD_URL) return false;
      const payload = JSON.stringify({ filename, content: jsonString });
      try {
        const res = await fetch(GOOGLE_DRIVE_UPLOAD_URL, {
          method: 'POST',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: payload
        });
        const text = await res.text();
        if (text.indexOf('"ok":true') !== -1 || text.indexOf('"ok": true') !== -1) return true;
      } catch (err) {
        console.warn('DigiTool upload fetch:', err);
      }
      return new Promise((resolve) => {
        const frameName = 'digitool_upload_' + Date.now();
        const frame = document.createElement('iframe');
        frame.name = frameName;
        frame.style.display = 'none';
        document.body.appendChild(frame);
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = GOOGLE_DRIVE_UPLOAD_URL;
        form.target = frameName;
        form.style.display = 'none';
        const field = document.createElement('input');
        field.type = 'hidden';
        field.name = 'payload';
        field.value = payload;
        form.appendChild(field);
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => {
          form.remove();
          frame.remove();
          resolve(true);
        }, 4000);
      });
    };

    const todayToken = () => {
      const d = new Date();
      const yy = String(d.getFullYear()).slice(-2);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yy}${mm}${dd}`;
    };

    const createRespondentId = () => {
      const token = todayToken();
      const counterKey = `digitool_daily_counter_${token}`;
      const last = parseInt(localStorage.getItem(counterKey) || '0', 10);
      const next = last + 1;
      localStorage.setItem(counterKey, String(next));
      return `sv${token}_${String(next).padStart(2, '0')}`;
    };

    const addSessionLog = (action, detail = {}) => {
      session.logs.push({ time: Date.now(), action, ...detail });
      writeJSON(SESSION_KEY, session);
    };
    const showThanksScreen = (uploadOk = true) => {
      const mainWrap = document.getElementById('main-wrap');
      const detail = uploadOk
        ? 'Tack för att du har slutfört alla tre uppgifter.<br>Datan sparades framgångsrikt.'
        : 'Tack för att du har slutfört alla tre uppgifter.<br>Uppladdningen till Google Drive misslyckades – be läraren kontrollera inställningen.';
      mainWrap.innerHTML = `
        <div class="thanks-screen">
          <h2>Tack!</h2>
          <p>${detail}</p>
        </div>
      `;
      introOverlay.style.display = 'none';
      hideBubble();
      ghostUI.style.display = 'none';
    };

    const setGhostCentered = () => {
      ghostUI.style.left = '50%';
      ghostUI.style.top = '50%';
      ghostUI.style.bottom = 'auto';
      ghostUI.style.transform = 'translate(-50%, -50%) scale(1)';
    };
    const setGhostMinimized = () => {
      ghostUI.style.left = '20px';
      ghostUI.style.top = '20px';
      ghostUI.style.bottom = 'auto';
      ghostUI.style.transform = 'scale(0.6)';
    };
    const showBubble = () => ghostBubble.classList.add('visible');
    const hideBubble = () => ghostBubble.classList.remove('visible');

    const renderGhostButtons = (items) => {
      ghostButtons.innerHTML = '';
      items.forEach((item) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ghost-btn';
        btn.textContent = item.label;
        btn.addEventListener('click', item.onClick);
        ghostButtons.appendChild(btn);
      });
    };

    const renderIntroStep = (step) => {
      session.intro_step = step;
      writeJSON(SESSION_KEY, session);
      showBubble();
      if (step === 1) {
        ghostText.innerHTML = 'Hej, jag kommer att guida dig genom dagens uppgifter.<br>Men först måste jag få veta lite om dig.';
        renderGhostButtons([{ label: 'Fortsätt', onClick: () => { addSessionLog('intro_step_1_continue'); renderIntroStep(2); } }]);
      } else if (step === 2) {
        ghostText.textContent = 'Vilken klass går du i?';
        renderGhostButtons(
          [2, 3, 4, 5, 6, 7, 8, 9].map((n) => ({
            label: `${n}`,
            onClick: () => {
              session.demographics.class = String(n);
              addSessionLog('demography_class_selected', { value: String(n) });
              renderIntroStep(3);
            },
          }))
        );
      } else {
        ghostText.textContent = 'Är du en tjej eller en kille?';
        renderGhostButtons([
          { label: 'Tjej', onClick: () => { session.demographics.gender = 'divka'; finishIntro(); } },
          { label: 'Kille', onClick: () => { session.demographics.gender = 'chlapec'; finishIntro(); } }
        ]);
      }
      writeJSON(SESSION_KEY, session);
    };

    const showTaskChooserGhost = () => {
      const { eDone, dDone, pDone } = getProgress();
      const doneCount = [eDone, dDone, pDone].filter(Boolean).length;
      if (doneCount >= 3) {
        ghostText.textContent = 'Vänta tills data har skickats till servern.';
      } else if (doneCount >= 1) {
        ghostText.textContent = 'Bra, du har redan löst uppgiften! Öppna nästa uppgift.';
      } else {
        ghostText.textContent = 'Välj vilken uppgift du vill börja med.';
      }
      renderGhostButtons([]);
      showBubble();
      ghostUI.style.transform = 'scale(1)';
      addSessionLog('ghost_task_choice_opened');
    };

    const finishIntro = () => {
      session.intro_done = true;
      addSessionLog('demography_gender_selected', { value: session.demographics.gender });
      addSessionLog('intro_completed', { demographics: session.demographics });
      writeJSON(SESSION_KEY, session);
      introOverlay.style.display = 'none';
      document.body.style.overflow = '';
      setGhostMinimized();
      hideBubble();
    };

    const getProgress = () => {
      const results = readJSON(RESULTS_KEY, {});
      const eDone = results.euler && results.euler.respondent_id === session.respondent_id;
      const dDone = results.degree && results.degree.respondent_id === session.respondent_id;
      const pDone = results.park && results.park.respondent_id === session.respondent_id;
      return { eDone, dDone, pDone, results };
    };

    const applyTaskAvailability = () => {
      const mainTitle = document.getElementById('main-title');
      const eulerBtn = document.getElementById('open-euler');
      const degreeBtn = document.getElementById('open-degree');
      const parkBtn = document.getElementById('open-park');
      const eulerCard = eulerBtn.closest('.card');
      const degreeCard = degreeBtn.closest('.card');
      const parkCard = parkBtn.closest('.card');
      const { eDone, dDone, pDone } = getProgress();

      eulerBtn.disabled = false;
      degreeBtn.disabled = false;
      parkBtn.disabled = false;
      eulerCard.classList.remove('locked');
      degreeCard.classList.remove('locked');
      parkCard.classList.remove('locked');

      if (eDone && dDone && pDone) {
        mainTitle.textContent = 'Vänta tills data har skickats till servern.';
        eulerBtn.disabled = true;
        degreeBtn.disabled = true;
        parkBtn.disabled = true;
        eulerCard.classList.add('locked');
        degreeCard.classList.add('locked');
        parkCard.classList.add('locked');
        return;
      }

      const doneCount = [eDone, dDone, pDone].filter(Boolean).length;
      if (doneCount >= 1) {
        mainTitle.textContent = 'Fortsätt till nästa uppgift.';
      } else {
        mainTitle.textContent = 'Välj vilken uppgift du vill börja med.';
      }

      if (eDone) {
        eulerBtn.disabled = true;
        eulerCard.classList.add('locked');
      }
      if (dDone) {
        degreeBtn.disabled = true;
        degreeCard.classList.add('locked');
      }
      if (pDone) {
        parkBtn.disabled = true;
        parkCard.classList.add('locked');
      }
    };

    const stripNestedRespondentId = (taskResult) => {
      if (!taskResult || typeof taskResult !== 'object') return taskResult;
      const out = { ...taskResult };
      delete out.respondent_id;
      return out;
    };

    const collectTaskActionLogs = (taskResult) => {
      if (!taskResult || typeof taskResult !== 'object') return [];
      if (Array.isArray(taskResult.action_logs) && taskResult.action_logs.length > 0) {
        return taskResult.action_logs;
      }
      const trials = Array.isArray(taskResult.trials) ? taskResult.trials : [];
      return trials.flatMap((trial) =>
        Array.isArray(trial?.action_logs) ? trial.action_logs : []
      );
    };

    const buildAllActionLogs = (results) => {
      const blocks = [
        { block: 'euler', logs: collectTaskActionLogs(results.euler) },
        { block: 'degree_sequence', logs: collectTaskActionLogs(results.degree) },
        { block: 'park', logs: collectTaskActionLogs(results.park) }
      ];
      const merged = [];
      blocks.forEach(({ block, logs }) => {
        logs.forEach((entry) => {
          merged.push({
            ...entry,
            task_block: entry.task_block || block
          });
        });
      });
      merged.sort((a, b) => (a.time || 0) - (b.time || 0));
      return merged;
    };

    const readSessionActionLogs = (respondentId, scope) => {
      try {
        const raw = sessionStorage.getItem(
          `digitool_action_logs_${respondentId || 'anon'}_${scope}`
        );
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    };

    const uploadCombinedIfReady = async () => {
      const { eDone, dDone, pDone, results } = getProgress();
      if (!eDone || !dDone || !pDone) return;
      const mainTitle = document.getElementById('main-title');
      if (mainTitle) {
        mainTitle.textContent = 'Vänta tills data har skickats till servern.';
      }
      if (session.downloaded) {
        showThanksScreen(true);
        return;
      }
      const allActionLogs = buildAllActionLogs(results);
      const combined = {
        respondent_id: session.respondent_id,
        started_at: session.started_at,
        first_task: session.first_task || null,
        demographics: session.demographics,
        hub_logs: session.logs,
        all_action_logs: allActionLogs,
        loglist: allActionLogs,
        euler: stripNestedRespondentId(results.euler),
        degree_sequence: stripNestedRespondentId(results.degree),
        park: stripNestedRespondentId(results.park),
        exported_at: new Date().toISOString()
      };
      const filename = `DigiTool_${session.respondent_id}.json`;
      const jsonString = JSON.stringify(combined, null, 2);
      let uploadOk = false;
      if (GOOGLE_DRIVE_UPLOAD_URL) {
        uploadOk = await uploadJsonToGoogleDrive(filename, jsonString);
        addSessionLog(uploadOk ? 'combined_upload_ok' : 'combined_upload_failed', { filename });
      } else {
        console.warn('GOOGLE_DRIVE_UPLOAD_URL není nastavená – data jen v prohlížeči.');
        addSessionLog('combined_upload_skipped_no_url');
      }
      session.downloaded = true;
      const archive = readJSON(ARCHIVE_KEY, []);
      archive.push(combined);
      writeJSON(ARCHIVE_KEY, archive);
      showThanksScreen(uploadOk);
    };

    const openTask = (fileName, taskKey) => {
      if (!session.intro_done) {
        addSessionLog('task_open_blocked_before_intro', { task: taskKey });
        return;
      }
      const { eDone, dDone, pDone } = getProgress();
      if (
        (taskKey === 'euler' && eDone) ||
        (taskKey === 'degree' && dDone) ||
        (taskKey === 'park' && pDone)
      ) {
        addSessionLog('task_open_blocked_already_completed', { task: taskKey });
        return;
      }
      if (!session.first_task) {
        session.first_task = taskKey;
        addSessionLog('first_task_selected', { task: taskKey });
      }
      addSessionLog('task_open_requested', { task: taskKey, file: fileName });
      const baseUrl = new URL('.', window.location.href);
      const taskUrl = new URL(fileName, baseUrl);
      taskUrl.searchParams.set('rid', session.respondent_id);
      window.location.href = taskUrl.toString();
    };

    const urlParams = new URLSearchParams(window.location.search);
    const completed = urlParams.get('completed');
    const isReturningFromTask = completed === 'euler' || completed === 'degree' || completed === 'park';

    const makeNewSession = () => ({
      respondent_id: createRespondentId(),
      started_at: new Date().toISOString(),
      intro_step: 1,
      intro_done: false,
      downloaded: false,
      first_task: null,
      demographics: { class: null, gender: null },
      logs: []
    });

    let session = readJSON(SESSION_KEY, null);
    const currentResults = readJSON(RESULTS_KEY, {});
    const hasEulerForSession = !!(session && currentResults.euler && currentResults.euler.respondent_id === session.respondent_id);
    const hasDegreeForSession = !!(session && currentResults.degree && currentResults.degree.respondent_id === session.respondent_id);
    const hasParkForSession = !!(session && currentResults.park && currentResults.park.respondent_id === session.respondent_id);
    const completedTaskCount = [hasEulerForSession, hasDegreeForSession, hasParkForSession].filter(Boolean).length;
    const inProgressSession = completedTaskCount > 0 && completedTaskCount < 3;

    if (!session || session.downloaded || (!isReturningFromTask && !inProgressSession)) {
      session = makeNewSession();
      writeJSON(SESSION_KEY, session);
      writeJSON(RESULTS_KEY, {});
    }
    respondentIdLabel.textContent = '';

    if (completed === 'euler' || completed === 'degree' || completed === 'park') {
      // Fallback: pokud se vrátíme z úlohy a výsledky nejsou správně navázané na session,
      // nastavíme minimální "completed" záznam, aby se zobrazila pokračovací stránka.
      const resultsSnapshot = readJSON(RESULTS_KEY, {});
      if (completed === 'euler') {
        const hasValidEuler = !!(resultsSnapshot.euler && resultsSnapshot.euler.respondent_id === session.respondent_id);
        if (!hasValidEuler) {
          const recovered = readSessionActionLogs(session.respondent_id, 'euler');
          resultsSnapshot.euler = {
            respondent_id: session.respondent_id,
            completed_at: new Date().toISOString(),
            action_logs: recovered.length ? recovered : resultsSnapshot.euler?.action_logs || [],
            trials: resultsSnapshot.euler?.trials || []
          };
          writeJSON(RESULTS_KEY, resultsSnapshot);
        }
      } else if (completed === 'degree') {
        const hasValidDegree = !!(resultsSnapshot.degree && resultsSnapshot.degree.respondent_id === session.respondent_id);
        if (!hasValidDegree) {
          const recovered = readSessionActionLogs(session.respondent_id, 'degree');
          resultsSnapshot.degree = {
            respondent_id: session.respondent_id,
            completed_at: new Date().toISOString(),
            action_logs: recovered.length ? recovered : resultsSnapshot.degree?.action_logs || [],
            trials: resultsSnapshot.degree?.trials || []
          };
          writeJSON(RESULTS_KEY, resultsSnapshot);
        }
      } else if (completed === 'park') {
        const hasValidPark = !!(resultsSnapshot.park && resultsSnapshot.park.respondent_id === session.respondent_id);
        if (!hasValidPark) {
          const recovered = readSessionActionLogs(session.respondent_id, 'park');
          resultsSnapshot.park = {
            respondent_id: session.respondent_id,
            completed_at: new Date().toISOString(),
            action_logs: recovered.length ? recovered : resultsSnapshot.park?.action_logs || [],
            trials: resultsSnapshot.park?.trials || []
          };
          writeJSON(RESULTS_KEY, resultsSnapshot);
        }
      }
    }

    if (completed === 'euler' || completed === 'degree' || completed === 'park') {
      addSessionLog('task_returned_to_hub', { task: completed });
      history.replaceState({}, '', 'index.html');
    }

    document.getElementById('open-euler').addEventListener('click', () => openTask('19_EulerTask_plus3.html', 'euler'));
    document.getElementById('open-degree').addEventListener('click', () => openTask('14_DegreeSequenceTask.html', 'degree'));
    document.getElementById('open-park').addEventListener('click', () => openTask('3_ParkTask.html', 'park'));

    ghostCharacter.addEventListener('click', () => {
      if (!session.intro_done) return;
      showTaskChooserGhost();
    });

    document.addEventListener('click', (e) => {
      if (!session.intro_done) return;
      if (!ghostUI.contains(e.target)) {
        hideBubble();
        setGhostMinimized();
      }
    });

    if (!session.intro_done) {
      introOverlay.style.display = 'block';
      document.body.style.overflow = 'hidden';
      setGhostCentered();
      showBubble();
      renderIntroStep(session.intro_step || 1);
      addSessionLog('intro_overlay_shown');
    } else {
      document.body.style.overflow = '';
      introOverlay.style.display = 'none';
      setGhostMinimized();
      hideBubble();
    }

    uploadCombinedIfReady();
    applyTaskAvailability();
  </script>
  <script>
    (function () {
      const HUB_VERSION = 'v8-google-drive';
      const prev = localStorage.getItem('digitool_hub_version');
      if (prev !== HUB_VERSION && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then((keys) => {
            keys.filter((k) => k.indexOf('digitool') !== -1).forEach((k) => caches.delete(k));
          });
        }
        localStorage.setItem('digitool_hub_version', HUB_VERSION);
      }
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js', { scope: './' }).catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
