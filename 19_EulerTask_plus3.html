        const suggestFixForEulerPath = () => {
          const ids = nodes.map((n) => n.id);
          if (ids.length < 2) return { add: [], remove: [] };
          const pairs = [];
          for (let i = 0; i < ids.length; i++) {
            for (let j = i + 1; j < ids.length; j++) {
              pairs.push([ids[i], ids[j]]);
            }
          }
          const pairToBit = new Map();
          pairs.forEach(([a, b], idx) => pairToBit.set(edgeKey(a, b), idx));
          const allMask = (1 << pairs.length) - 1;
          let startMask = 0;
          edges.forEach((e) => {
            const bit = pairToBit.get(edgeKey(e.from, e.to));
            if (bit !== undefined) startMask |= (1 << bit);
          });
          const isPossibleMask = (mask) => {
            const deg = {};
            ids.forEach((id) => { deg[id] = 0; });
            const adj = {};
            ids.forEach((id) => { adj[id] = []; });
            pairs.forEach(([a, b], idx) => {
              if ((mask & (1 << idx)) === 0) return;
              deg[a] += 1;
              deg[b] += 1;
              adj[a].push(b);
              adj[b].push(a);
            });
            if (ids.some((id) => deg[id] === 0)) return false;
            const odd = ids.filter((id) => deg[id] % 2 !== 0).length;
            if (odd !== 0 && odd !== 2) return false;
            const visited = new Set();
            const q = [ids[0]];
            while (q.length) {
              const cur = q.shift();
              if (visited.has(cur)) continue;
              visited.add(cur);
              adj[cur].forEach((nx) => { if (!visited.has(nx)) q.push(nx); });
            }
            return ids.every((id) => visited.has(id));
          };
          if (isPossibleMask(startMask)) return { add: [], remove: [] };
          const best = new Array(allMask + 1).fill(null);
          best[startMask] = { rem: 0, total: 0, prev: -1, bit: -1, added: false };

            for (let bit = 0; bit < pairs.length; bit++) {
              const has = (cur & (1 << bit)) !== 0;
              const next = has ? (cur & ~(1 << bit)) : (cur | (1 << bit));
              const cand = { rem: rec.rem + (has ? 1 : 0), total: rec.total + 1, prev: cur, bit, added: !has };
              const old = best[next];
              const better = !old || cand.rem < old.rem || (cand.rem === old.rem && cand.total < old.total);
              if (better) {
                best[next] = cand;
                queue.push(next);
              }
            }
          }
          let target = -1;

            if (!best[mask]) continue;
            if (!isPossibleMask(mask)) continue;
            if (target === -1) target = mask;
            else {
              const a = best[mask];
              const b = best[target];
              if (a.rem < b.rem || (a.rem === b.rem && a.total < b.total)) target = mask;
            }
          }
          if (target === -1) return { add: [], remove: [] };
          const add = [];
          const remove = [];
          let cur = target;
          while (cur !== startMask) {
            const step = best[cur];
            const [a, b] = pairs[step.bit];
            if (step.added) add.push({ from: a, to: b });
            else remove.push({ from: a, to: b });

          }

        };

          const newId = nodes.length ? Math.max(...nodes.map((n) => n.id)) + 1 : 1;

          logEuler4Action('create_star', { node: newId, x: Math.round(p.x), y: Math.round(p.y) });
          selectedNodeId = null;
          saveState();
          hideEuler4NoStarHint();
          clearBlueVertexHint();
          euler4OneStrokeSelectedNodeId = null;

              const ek = edgeKey(euler4OneStrokeSelectedNodeId, node.id);

              if (hasEdge && !euler4OneStrokeTracedEdgeSet.has(ek)) {

              } else {

              }

          suggestedRemoveEdges = new Set();

          draw();
        });
        document.getElementById('euler4-clear').addEventListener('click', () => {
          if (history.length <= 1) {
            showHintBanner('euler4-undo-empty');
            logEuler4Action('restart_rejected_no_edges');
            return;
          }
          nodes = [];
          edges = [];
          selectedNodeId = null;
          suggestedAddEdges = new Set();
          suggestedRemoveEdges = new Set();
          history = [{ nodes: [], edges: [] }];
          euler4OneStrokeSelectedNodeId = null;
          euler4OneStrokeTracedEdges = [];
          euler4OneStrokeTracedEdgeSet = new Set();
          document.getElementById('euler4-status').textContent = '';
          clearBlueVertexHint();
          logEuler4Action('restart_cleared_all');
          draw();
        });
        const euler4OneStrokeBtn = document.getElementById('euler4-toggle-one-stroke');
        const refreshEuler4OneStrokeBtn = () => {
          if (!euler4OneStrokeBtn) return;
          euler4OneStrokeBtn.classList.toggle('toggle-on', euler4OneStrokeMode);
        };
        if (euler4OneStrokeBtn) {
          euler4OneStrokeBtn.addEventListener('click', () => {
            euler4OneStrokeMode = !euler4OneStrokeMode;
            logEuler4Action('euler4_one_stroke_mode_toggled', { enabled: euler4OneStrokeMode });
            euler4OneStrokeSelectedNodeId = null;
            euler4OneStrokeTracedEdges = [];
            euler4OneStrokeTracedEdgeSet = new Set();
            if (euler4OneStrokeMode) showEuler4OneStrokeBanner();
            else hideEuler4OneStrokeBanner();
            refreshEuler4OneStrokeBtn();
            draw();
          });
          refreshEuler4OneStrokeBtn();
        }
        document.getElementById('euler4-hide-hint').addEventListener('click', () => {
          dismissEuler4Hints();
          logEuler4Action('hide_hint', { source: 'euler4-hide-hint' });
        });
        document.getElementById('euler4-evaluate').addEventListener('click', () => {
          const analysis = analyzeGraph(nodes, edges);
          const requirementMet = nodes.length === 6 && analysis.possible;
          const fixSuggestion = (!analysis.possible && edges.length > 0) ? suggestFixForEulerPath() : { add: [], remove: [] };
          suggestedAddEdges = new Set();
          suggestedRemoveEdges = new Set();
          evaluation = {
            nodes_count: nodes.length,
            edges_count: edges.length,
            odd_count: analysis.oddCount,
            possible: analysis.possible,
            requirement_met: requirementMet,
            suggested_add_edges: fixSuggestion.add,
            suggested_remove_edges: fixSuggestion.remove
          };
          logEuler4Action('btn_evaluate_clicked', { evaluation });
          document.getElementById('euler4-status').textContent = '';
          clearBlueVertexHint();
          draw();
          showSelfAssessmentGhost();
        });

        const showEuler4GhostHelp = () => {
          logEuler4Action('ghost_clicked_for_hint');
          ghostText.innerHTML = 'Hur kan jag hjälpa dig?';
          ghostButtons.innerHTML = `
            <button type="button" id="euler4-ghost-hint-btn-create" class="ghost-hint-btn">Jag vet inte hur man skapar stjärnor.</button>
            <button type="button" id="euler4-ghost-hint-btn-odd" class="ghost-hint-btn">Jag vet inte vilka linjer jag ska lägga till eller ta bort.</button>
            <button type="button" id="euler4-ghost-hint-close" class="ghost-hint-btn" style="background:#6c757d;">Stäng ledtråd</button>
          `;
          ghostBubble.classList.add('visible');
          ghostUI.style.transform = 'scale(1)';

          document.getElementById('euler4-ghost-hint-btn-create').addEventListener('click', () => {
            logEuler4Action('hint_1_used', { hint_key: 'create_stars' });
            hideEuler4GhostBanners();
            showBlueVertexHint = false;
            draw();
            showHintBanner('euler4-ghost-hint-create');
            ghostBubble.classList.remove('visible');
            ghostUI.style.transform = 'scale(0.6)';
            ghostText.textContent = '';
            ghostButtons.innerHTML = '';
          });
          document.getElementById('euler4-ghost-hint-btn-odd').addEventListener('click', () => {
            logEuler4Action('hint_2_used', { hint_key: 'odd_vertices' });
            hideEuler4GhostBanners();
            showHintBanner('euler4-ghost-hint-odd');
            showBlueVertexHint = true;
            draw();
            ghostBubble.classList.remove('visible');
            ghostUI.style.transform = 'scale(0.6)';
            ghostText.textContent = '';
            ghostButtons.innerHTML = '';
          });
          document.getElementById('euler4-ghost-hint-close').addEventListener('click', () => {
            logEuler4Action('ghost_hint_closed');
            hideEuler4GhostBanners();
            clearBlueVertexHint();
            ghostBubble.classList.remove('visible');
            ghostUI.style.transform = 'scale(0.6)';
            ghostText.textContent = '';
            ghostButtons.innerHTML = '';
          });
        };

        document.getElementById('ghost-character-e4').addEventListener('click', () => {
          if (document.body.classList.contains('digitool-self-assessment-lock')) return;
          const b = document.getElementById('ghost-bubble-e4');
          if (b && b.classList.contains('euler-self-assessment-wide')) return;
          showEuler4GhostHelp();
        });

        setupDigitoolIdleGhostPrompt({
          log: (d) => {
            const { action, ...rest } = d || {};
            if (action) logEuler4Action(action, rest);
          },
          isIdleAllowed: () => {
            const b = document.getElementById('ghost-bubble-e4');
            return (
              !document.body.classList.contains('digitool-self-assessment-lock') &&
              b &&
              !b.classList.contains('euler-self-assessment-wide')
            );
          },
          ghostText,
          ghostButtons,
          ghostBubble,
          ghostUI,
          defaultGhostHtml: '',
          defaultGhostButtonsHtml: '',
          onRequestHelp: showEuler4GhostHelp
        });
        draw();
      }
    };

    // ==========================================
    // STARTING THE EXPERIMENT
    // ==========================================
    jsPsych.run([
      DigitoolActionLogStore.bindTrialOnFinish(EulerTask1, () =>
        DigitoolActionLogStore.read(respondentIdFromUrl, 'euler')
      ),
      DigitoolActionLogStore.bindTrialOnFinish(EulerTask2, () =>
        DigitoolActionLogStore.read(respondentIdFromUrl, 'euler')
      ),
      DigitoolActionLogStore.bindTrialOnFinish(EulerTask3, () =>
        DigitoolActionLogStore.read(respondentIdFromUrl, 'euler')
      ),
      DigitoolActionLogStore.bindTrialOnFinish(EulerTask4, () =>
        DigitoolActionLogStore.read(respondentIdFromUrl, 'euler')
      )
    ]);
  </script>
</body>
</html>
