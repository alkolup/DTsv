
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigiTool</title>
  
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="digitool-action-log-store.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" />
  
  <style>
    body { height: 100%; margin: 0; background-color: #f4f4f9; }
    .wrap { max-width: min(1140px, calc(100vw - 24px)); margin: 24px auto; padding: 18px 16px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; width: 100%; }
    .prompt { margin-bottom: 20px; font-size: 18px; line-height: 1.5; text-align: center; }
    /* Společné styly pro kontejnery */
    .svg-container { width: 100%; height: 420px; background: #fff; border: 1px solid #ddd; border-radius: 8px; touch-action: none; }
    .ui { text-align: center; margin-top: 15px; }
    .note { color: #555; font-size: 14px; }

    /* ==========================================
       Styly pro úlohu 1 (EulerTask1 – hvězdy)
       ========================================== */
    #euler-graph { background-color: #3d7fb3; }

    /* Žluté nápovědy: zalamování na výšku, ne rozšiřování layoutu do šířky */
    .task-hint-banner {
      box-sizing: border-box;
      max-width: 100%;
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
    }
    /* SVG plátno (viewBox 480×360) — úloha 1 má tmavě modré pozadí #euler-graph */
    .degree-plot-column {
      width: 480px;
      max-width: min(480px, 100%);
      flex: 0 1 auto;
      min-width: 0;
    }
    .degree-plot-column--centered {
      margin-left: auto;
      margin-right: auto;
    }
    .degree-plot-column .svg-container {
      width: 100%;
      max-width: 480px;
      height: 420px;
      display: block;
      box-sizing: border-box;
    }
    
    .numpad-btn { font-size: 24px; font-weight: bold; border: 2px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; transition: 0.2s; }
    .numpad-btn:hover { background: #f0f0f0; border-color: #888; }
    
    .euler-star-node { cursor: pointer; }
    .euler-star-node .star-hit { fill: transparent; stroke: transparent; stroke-width: 0; }
    .euler-star-node .star-shape { fill: #ffd54f; stroke: #b8860b; stroke-width: 2px; transition: stroke 0.2s, stroke-width 0.2s; pointer-events: none; }
    .euler-star-node:hover .star-shape { stroke: #8b6914; stroke-width: 2.5px; }
    .euler-star-node.selected .star-shape { stroke: #ff8c00; stroke-width: 4px; }
    .euler-star-node.hint-suggest:not(.selected) .star-shape {
      fill: #a8d8ff;
      stroke: #5aa9e6;
      stroke-width: 2.5px;
    }
    .euler-base-edge line { stroke: #ffffff; stroke-width: 5px; stroke-linecap: round; }
    .euler-edge-traced { opacity: 1; }
    .euler-edge-untraced { opacity: 0; pointer-events: none; }

    /* Úloha 2: šest mini-grafů */
    .euler-task2-wrap { max-width: 980px; margin: 0 auto; }
    .euler-task2-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 18px 16px;
      align-items: start;
      justify-items: center;
    }
    @media (max-width: 720px) {
      .euler-task2-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
    }
    .euler-task2-cell {
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 2px solid #1a4a6e;
      border-radius: 12px;
      background: #f6fbff;
      padding: 10px 10px 12px;
      box-sizing: border-box;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .euler-task2-cell svg {
      width: 100%;
      height: 220px;
      max-width: 396px;
      background-color: #3d7fb3;
      border-radius: 8px;
      border: 1px solid #1a4a6e;
      display: block;
      margin: 0 auto;
      touch-action: pan-y;
    }
    .euler-task2-cell .euler2-yesno {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .euler-task2-cell .euler2-yesno button {
      padding: 8px 14px;
      border: 2px solid transparent;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    .euler-task2-cell .euler2-yesno button:first-of-type {
      background: #28a745;
      border-color: #1e7e34;
    }
    .euler-task2-cell .euler2-yesno button:first-of-type:hover { background: #218838; }
    .euler-task2-cell .euler2-yesno button:first-of-type.euler2-btn-on {
      background: #1c7430;
      border-color: #155724;
      box-shadow: 0 0 0 5px #1e7e34;
    }
    .euler-task2-cell .euler2-yesno button:last-of-type {
      background: #dc3545;
      border-color: #bd2130;
    }
    .euler-task2-cell .euler2-yesno button:last-of-type:hover { background: #c82333; }
    .euler-task2-cell .euler2-yesno button:last-of-type.euler2-btn-on {
      background: #bd2130;
      border-color: #a71d2a;
      box-shadow: 0 0 0 5px #bd2130;
    }
    .euler-task2-caption {
      font-size: 13px;
      color: #333;
      margin-top: 6px;
      line-height: 1.3;
    }

    /* ==========================================
       Styly pro úlohu 3 (Klasický graf - Connect)
       ========================================== */
    #connect-graph, #connect-graph-3 { background-color: #e6f2eb; } /* stejné jako DegreeSequence */
    .node { cursor: grab; }
    .node:active { cursor: grabbing; }
    .node .town-highlight { fill: transparent; stroke: transparent; stroke-width: 3px; transition: 0.2s; }
    .node:hover .town-highlight { fill: rgba(255, 255, 255, 0.5); }
    .node.selected .town-highlight { fill: #b3e0ff; stroke: #007bff; }
    .node.correct .town-highlight { fill: #d4edda; stroke: #28a745; }
    .node.incorrect .town-highlight { fill: #f8d7da; stroke: #dc3545; }
    .node .town-icon { font-size: 32px; text-anchor: middle; dominant-baseline: central; pointer-events: none; user-select: none; }

    .node text { user-select: none; pointer-events: none; font-family: sans-serif; font-weight: bold; font-size: 14px; text-anchor: middle; dominant-baseline: central; }
    .edge { stroke: none; }
    .ghost-bubble {
      margin-left: -10px;
      margin-bottom: 40px;
      position: relative;
      background: #fff;
      border: 3px solid #007bff;
      border-radius: 20px;
      padding: 20px;
      min-width: 280px;
      max-width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 0;
      pointer-events: none;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .ghost-bubble.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .euler-ghost-bubble-task3.euler-self-assessment-wide {
      max-height: min(92vh, 920px);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* Blokové flex #ghost-ui jinak sahá přes celou šířku a s vysokým z-indexem pohltí kliky na tlačítka úlohy pod ním */
    #ghost-ui,
    #ghost-ui-e3,
    #ghost-ui-e4 {
      width: max-content;
      max-width: 100%;
      box-sizing: border-box;
      pointer-events: none;
    }
    #ghost-ui #ghost-character,
    #ghost-ui-e3 #ghost-character-e3,
    #ghost-ui-e4 #ghost-character-e4 {
      pointer-events: auto;
      cursor: pointer;
    }
    .ghost-text {
      font-size: 17px;
      font-weight: 700;
      color: #1f2a44;
      margin-bottom: 15px;
      text-align: center;
      line-height: 1.3;
    }
    .ghost-buttons > button,
    .ghost-hint-btn {
      margin-top: 4px;
      padding: 10px 15px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
      text-align: center;
    }
    .ghost-buttons > button:hover,
    .ghost-hint-btn:hover {
      background: #0056d2;
    }
    .custom-task-btn.toggle-on {
      background: #ff9f1c !important;
      border-color: #ff9f1c !important;
      color: #111 !important;
    }
    /* Dialog „Myslíš si…“: skrýt šedá tlačítka, zablokovat úlohu; duch (ghost-hint-btn) zůstane */
    body.digitool-self-assessment-lock #jspsych-target button.custom-task-btn {
      display: none !important;
    }
    body.digitool-self-assessment-lock #jspsych-target #euler-container.digitool-task-surface,
    body.digitool-self-assessment-lock #jspsych-target #euler2-container.digitool-task-surface,
    body.digitool-self-assessment-lock #jspsych-target #euler2-controls-fixed,
    body.digitool-self-assessment-lock #jspsych-target .digitool-task-surface {
      pointer-events: none !important;
      user-select: none !important;
    }
  </style>
</head>
<body>
  <div id="jspsych-target" class="wrap"></div>

  <script>
    const DIGITOOL_RESULTS_KEY = 'digitool_results';
    const DIGITOOL_HUB_FILE = 'index.html';
    const setDigitoolSelfAssessmentUiLock = (locked) => {
      document.body.classList.toggle('digitool-self-assessment-lock', !!locked);
    };

    const DIGITOOL_IDLE_MS = 45 * 1000;
    let digitoolIdleDispose = () => {};
    const disposeDigitoolIdleTimer = () => {
      digitoolIdleDispose();
      digitoolIdleDispose = () => {};
    };
    const setupDigitoolIdleGhostPrompt = (opts) => {
      const {
        log,
        isIdleAllowed,
        ghostText,
        ghostButtons,
        ghostBubble,
        ghostUI,
        onRequestHelp,
        defaultGhostHtml,
        defaultGhostButtonsHtml = ''
      } = opts;
      disposeDigitoolIdleTimer();
      let timerId = null;
      const clearTimer = () => {
        if (timerId !== null) {
          clearTimeout(timerId);
          timerId = null;
        }
      };
      const armTimer = () => {
        clearTimer();
        timerId = setTimeout(showIdlePrompt, DIGITOOL_IDLE_MS);
      };
      const showIdlePrompt = () => {
        if (!isIdleAllowed()) {
          armTimer();
          return;
        }
        if (typeof log === 'function') log({ action: 'idle_prompt_shown', idle_ms: DIGITOOL_IDLE_MS });
        ghostText.textContent = 'Behöver du en ledtråd?';
        ghostButtons.style.flexDirection = 'column';
        ghostButtons.innerHTML =
          '<button type="button" id="digitool-idle-work" style="padding: 10px 15px; border: none; border-radius: 8px; background: #28a745; color: white; cursor: pointer; font-weight: bold; font-size: 14px;">Jag vill arbeta.</button>' +
          '<button type="button" id="digitool-idle-help" style="padding: 10px 15px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 14px;">Jag vill ha en ledtråd.</button>';
        ghostBubble.classList.add('visible');
        ghostUI.style.transform = 'scale(1)';
        document.getElementById('digitool-idle-work').addEventListener(
          'click',
          (e) => {
            e.stopPropagation();
            if (typeof log === 'function') log({ action: 'idle_prompt_work' });
            ghostBubble.classList.remove('visible');
            ghostUI.style.transform = 'scale(0.6)';
            ghostText.innerHTML = defaultGhostHtml;
            ghostButtons.innerHTML = defaultGhostButtonsHtml;
            armTimer();
          },
          { once: true }
        );
        document.getElementById('digitool-idle-help').addEventListener(
          'click',
          (e) => {
            e.stopPropagation();
            if (typeof log === 'function') log({ action: 'idle_prompt_help' });
            armTimer();
            onRequestHelp();
          },
          { once: true }
        );
      };
      const onActivity = () => armTimer();
      document.addEventListener('click', onActivity, true);
      document.addEventListener('pointerdown', onActivity, true);
      armTimer();
      digitoolIdleDispose = () => {
        clearTimer();
        document.removeEventListener('click', onActivity, true);
        document.removeEventListener('pointerdown', onActivity, true);
        digitoolIdleDispose = () => {};
      };
    };

    const showHintBanner = (idOrEl) => {
      const el = typeof idOrEl === 'string' ? document.getElementById(idOrEl) : idOrEl;
      if (!el) return;
      el.style.display = 'block';
      requestAnimationFrame(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    };
    const attachWindowScrollLogger = (logFn, scope) => {
      let ticking = false;
      const onScroll = () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          logFn('window_scroll', {
            scope,
            scroll_x: Math.round(window.scrollX || 0),
            scroll_y: Math.round(window.scrollY || 0)
          });
          ticking = false;
        });
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      return () => window.removeEventListener('scroll', onScroll);
    };
    const urlParams = new URLSearchParams(window.location.search);
    const respondentIdFromUrl = urlParams.get('rid');
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState(null, '', location.href);
    });

    const buildActionLogDescription = (action, detail) => {
      if (detail.node != null && detail.new_x != null && detail.new_y != null) {
        return `${action}: node ${detail.node} -> (${detail.new_x}, ${detail.new_y})`;
      }
      if (detail.from != null && detail.to != null) {
        return `${action}: ${detail.from}-${detail.to}`;
      }
      if (detail.node != null) return `${action}: node ${detail.node}`;
      return action;
    };

    const normalizeActionLogEntryForExport = (entry) => {
      if (!entry || typeof entry !== 'object') return entry;
      const action = entry.action || entry.type || 'unknown_action';
      const time =
        entry.time ??
        (entry.ts_iso ? Date.parse(entry.ts_iso) : null) ??
        Date.now();
      const detail = { ...entry };
      delete detail.action;
      delete detail.type;
      delete detail.time;
      delete detail.t_ms;
      delete detail.ts_iso;
      delete detail.description;
      const hasDetail = Object.keys(detail).length > 0;
      return {
        time,
        action,
        description: hasDetail ? buildActionLogDescription(action, detail) : action,
        ...detail
      };
    };

    const collectTrialActionLogsForExport = (trial) => {
      if (!trial || typeof trial !== 'object') return [];
      if (Array.isArray(trial.action_logs) && trial.action_logs.length > 0) {
        return trial.action_logs;
      }
      if (Array.isArray(trial.interaction_log) && trial.interaction_log.length > 0) {
        return trial.interaction_log;
      }
      return Array.isArray(trial.action_logs) ? trial.action_logs : [];
    };

    const sanitizeDigitoolJsPsychTrialsForExport = (trials) =>
      trials.map((t) => {
        if (!t || typeof t !== 'object') return t;
        const out = { ...t };
        if ('stimulus' in out) out.stimulus = '';
        if (out.action_logs || out.interaction_log) {
          out.action_logs = collectTrialActionLogsForExport(out).map(
            normalizeActionLogEntryForExport
          );
          delete out.interaction_log;
        }
        if ('final_nodes' in out) delete out.final_nodes;
        if ('final_edges' in out) delete out.final_edges;
        return out;
      });

    const saveEulerToHub = () => {
      try {
        const storedLogs = DigitoolActionLogStore.read(respondentIdFromUrl, 'euler');
        let allData = sanitizeDigitoolJsPsychTrialsForExport(jsPsych.data.get().values());
        allData = DigitoolActionLogStore.mergeTrialsWithStoredLogs(allData, storedLogs);
        const parsed = JSON.parse(localStorage.getItem(DIGITOOL_RESULTS_KEY) || '{}');
        parsed.euler = {
          respondent_id: respondentIdFromUrl || null,
          completed_at: new Date().toISOString(),
          action_logs: storedLogs.map(normalizeActionLogEntryForExport),
          trials: allData
        };
        localStorage.setItem(DIGITOOL_RESULTS_KEY, JSON.stringify(parsed));
        window.location.href = `${DIGITOOL_HUB_FILE}?completed=euler`;
        return true;
      } catch (err) {
        console.error('Nepodařilo se uložit Euler data do hubu:', err);
        return false;
      }
    };

    const jsPsych = initJsPsych({
    display_element: 'jspsych-target',
    on_finish: function() {
        if (!saveEulerToHub()) {
          alert('Sparning misslyckades. Uppdatera sidan och försök igen.');
        }
    }
});


 // ==========================================
    // ÚLOHA 1: EulerTask1 – hvězdy a oranžové hrany
    // ==========================================
    const EulerTask1 = {
      type: jsPsychHtmlButtonResponse,
      choices: [],
      data: { task_name: 'EulerTask1' },
      stimulus: () => {
        return `
          <div id="ghost-ui" style="position: fixed; bottom: 20px; left: 20px; display: flex; align-items: flex-end; z-index: 999; transition: transform 0.5s ease; transform: scale(1); transform-origin: bottom left;">            
            <div id="ghost-character" style="text-align: center; animation: float 3s ease-in-out infinite; cursor: pointer;">
              <div style="font-size: 100px; line-height: 1;">👻</div>
              <div style="font-weight: bold; background: #d8efff; padding: 2px 8px; border-radius: 10px;"></div>
            </div>

            <div id="ghost-bubble" class="ghost-bubble euler-ghost-bubble-task1">
              <div id="ghost-text" class="ghost-text">
                Har du någonsin löst en liknande uppgift?
              </div>
              <div id="ghost-buttons" style="display: flex; gap: 10px; justify-content: center; flex-direction: row;">
                <button id="ghost-btn-yes" style="padding: 10px 15px; border: none; border-radius: 8px; background: #28a745; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">Ja</button>
                <button id="ghost-btn-unknown" style="padding: 10px 15px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">Jag vet inte</button>
                <button id="ghost-btn-no" style="padding: 10px 15px; border: none; border-radius: 8px; background: #dc3545; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">Nej</button>
              </div>
              <div style="position: absolute; bottom: -15px; left: 30px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 15px solid #007bff;"></div>
              <div style="position: absolute; bottom: -10px; left: 30px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 15px solid #fff;"></div>
            </div>
          </div>

          <div id="euler-container" class="digitool-task-surface" style="position: relative;">
            <div id="ghost-blocker" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 998; cursor: pointer;"></div>
            <div class="prompt" style="position: relative;">
              <h2>Rita bilden med ett enda drag.</h2>
              <p>Genom att dra från en stjärna till en annan skapar du en orange linje. Kan du ansluta alla stjärnor med ett enda drag?</p>
              
              <div id="hint-must-answer" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Först måste du svara på spökets frågor.
              </div>

              <div id="hint-not-adjacent" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Du kan bara ansluta stjärnor som också är anslutna på bilden.
              </div>
              
              <div id="hint-already-edge" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Du har redan anslutit dessa två stjärnor.
              </div>
              
              <div id="hint-restart-empty" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Anslut först minst två stjärnor.
              </div>
              <div id="hint-undo-empty" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Först måste du klicka på en stjärna.
              </div>

              <div id="hint-how-stars" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Klicka på stjärnan och sedan på den andra stjärnan som är kopplad till den. Detta skapar din egen orangea linje. Fortsätt och försök att rita bilden med ett enda drag.
              </div>
              <div id="hint-blue-stars-guide" class="task-hint-banner" style="display: none; background: #fff3cd; color: #856404; border: 2px solid #ffeaa7; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                Blå stjärnor visar dig var du kan fortsätta.
              </div>
            </div>
            
            <div style="display: flex; gap: 20px; align-items: flex-start; justify-content: center;">
              <div class="degree-plot-column degree-plot-column--centered">
                <svg id="euler-graph" class="svg-container" viewBox="0 0 480 360" preserveAspectRatio="xMidYMid meet" style="background-color: #3d7fb3;"></svg>
              </div>
            </div>
          </div>

	<div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">

      },
      on_load: () => {
        setDigitoolSelfAssessmentUiLock(false);

        const svg = document.getElementById('euler-graph');

        });
        actionLogs.push({ action: 'task_loaded', task_name: 'EulerTask1' });
        const detachWindowScrollLoggerEuler1 = attachWindowScrollLogger((action, detail) => {

        }, 'EulerTask1');
        const tracedEdgeKeys = new Set();
        const edgeTraceStack = [];
        const edgeDomByKey = {};

        let ghostState = 1;

        let familiarityAnswer2 = null;

        const ghostIntroAnswerForLog = (uiAnswer) =>
          ({ Ja: 'Ano', 'Jag vet inte': 'Nevím', Nej: 'Ne' }[uiAnswer] ?? uiAnswer);
        /** Po nápovědě „Nevím, jestli úlohu chápu…“ znovu obarvovat doporučené hvězdy po každém kliknutí. */
        let eulerHintFollowThrough = false;
        let eulerSelfAssessmentOpen = false;
        let eulerTask1Finalizing = false;
        let draggedNodeId = null;
        let dragMoved = false;
        let dragStartPoint = { x: 0, y: 0 };
        const DRAG_THRESHOLD = 3;
        let attemptCount = 0;
        let successfulOneStrokeCount = 0;
        let wasSingleStrokeComplete = false;
        const nodeDomById = {};

        const ghostText = document.getElementById('ghost-text');
        const ghostButtons = document.getElementById('ghost-buttons');
        const ghostBubble = document.getElementById('ghost-bubble');
        const ghostUI = document.getElementById('ghost-ui');
        const ghostCharacter = document.getElementById('ghost-character');

        const hideTaskHints = () => {
          ['hint-not-adjacent', 'hint-already-edge', 'hint-restart-empty', 'hint-undo-empty', 'hint-how-stars', 'hint-blue-stars-guide'].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
          });
        };

        const edgeKey = (u, v) => (u < v ? `${u}-${v}` : `${v}-${u}`);
        const nodes = [
          { id: 1, x: 100, y: 260 },
          { id: 2, x: 300, y: 260 },
          { id: 3, x: 100, y: 140 },
          { id: 4, x: 300, y: 140 },
          { id: 5, x: 200, y: 50 }
        ];
        const initialNodePositions = new Map(nodes.map((n) => [n.id, { x: n.x, y: n.y }]));
        const edges = [
          { u: 1, v: 2 },
          { u: 1, v: 3 },
          { u: 1, v: 4 },
          { u: 2, v: 3 },
          { u: 2, v: 4 },
          { u: 3, v: 4 },
          { u: 3, v: 5 },
          { u: 4, v: 5 }
        ];
        const adjacency = new Set(edges.map((e) => edgeKey(e.u, e.v)));

        const vbW = 480;
        const vbH = 360;
        let gxMin = Infinity;
        let gxMax = -Infinity;
        let gyMin = Infinity;
        let gyMax = -Infinity;
        nodes.forEach((n) => {
          gxMin = Math.min(gxMin, n.x);
          gxMax = Math.max(gxMax, n.x);
          gyMin = Math.min(gyMin, n.y);
          gyMax = Math.max(gyMax, n.y);
        });
        const gcx = (gxMin + gxMax) / 2;
        const gcy = (gyMin + gyMax) / 2;
        const graphContent = document.createElementNS(svgNS, 'g');
        graphContent.setAttribute('transform', `translate(${vbW / 2 - gcx},${vbH / 2 - gcy})`);
        svg.appendChild(graphContent);

        const getRemainingEdgesFromUsed = (usedKeys) =>
          edges.filter((e) => !usedKeys.has(edgeKey(e.u, e.v)));

        const openEulerPathExists = (remEdges, from, to) => {
          if (remEdges.length === 0) return from === to;
          const deg = new Map(nodes.map((n) => [n.id, 0]));
          const withEdge = new Set();
          remEdges.forEach((e) => {
            deg.set(e.u, deg.get(e.u) + 1);
            deg.set(e.v, deg.get(e.v) + 1);
            withEdge.add(e.u);
            withEdge.add(e.v);
          });
          const odds = nodes.filter((n) => deg.get(n.id) % 2 === 1).map((n) => n.id);
          if (odds.length !== 2) return false;
          if (!odds.includes(from) || !odds.includes(to) || from === to) return false;
          const seen = new Set();
          const st = [from];
          while (st.length) {
            const v = st.pop();
            if (seen.has(v)) continue;
            seen.add(v);
            remEdges.forEach((e) => {
              if (e.u === v && !seen.has(e.v)) st.push(e.v);
              if (e.v === v && !seen.has(e.u)) st.push(e.u);
            });
          }
          for (const v of withEdge) if (!seen.has(v)) return false;
          return true;
        };

        const neighborsUnused = (v, usedKeys) =>
          edges
            .filter((e) => !usedKeys.has(edgeKey(e.u, e.v)) && (e.u === v || e.v === v))
            .map((e) => (e.u === v ? e.v : e.u));

        const clearSuggestionStars = () => {
          svg.querySelectorAll('.euler-star-node.hint-suggest').forEach((g) => g.classList.remove('hint-suggest'));
          const guide = document.getElementById('hint-blue-stars-guide');
          if (guide) guide.style.display = 'none';
        };
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

        const isCurrentDrawingSingleStrokeComplete = () => {
          if (tracedEdgeKeys.size !== edges.length) return false;
          if (edgeTraceStack.length !== edges.length) return false;

          const uniqueKeysInStack = new Set(edgeTraceStack.map((e) => e.key));
          if (uniqueKeysInStack.size !== edges.length) return false;

          for (let i = 1; i < edgeTraceStack.length; i += 1) {
            if (edgeTraceStack[i - 1].v !== edgeTraceStack[i].u) return false;
          }

          return true;
        };

        const refreshOneStrokeCompletionStats = (sourceAction) => {
          const isCompleteNow = isCurrentDrawingSingleStrokeComplete();
          if (isCompleteNow && !wasSingleStrokeComplete) {
            successfulOneStrokeCount += 1;
            actionLogs.push({
              time: Date.now(),
              action: 'single_stroke_completed',
              source: sourceAction,
              successful_one_stroke_count: successfulOneStrokeCount
            });
          }
          wasSingleStrokeComplete = isCompleteNow;
        };

        const computeSuggestedVertices = () => {
          const used = tracedEdgeKeys;
          const targetFromStart = (startV) => (startV === 1 ? 2 : 1);
          if (edgeTraceStack.length === 0) {
            if (selectedNodeId === null) return [1, 2];
            if (selectedNodeId !== 1 && selectedNodeId !== 2) return [1, 2];
            const ps = selectedNodeId;
            const te = targetFromStart(ps);
            return neighborsUnused(ps, used).filter((w) => {
              const used2 = new Set(used);
              used2.add(edgeKey(ps, w));
              const rem = getRemainingEdgesFromUsed(used2);
              return openEulerPathExists(rem, w, te);
            });
          }
          const pathStartV = edgeTraceStack[0].u;
          const te = targetFromStart(pathStartV);
          const currentEnd = edgeTraceStack[edgeTraceStack.length - 1].v;
          return neighborsUnused(currentEnd, used).filter((w) => {
            const used2 = new Set(used);
            used2.add(edgeKey(currentEnd, w));
            const rem = getRemainingEdgesFromUsed(used2);
            return openEulerPathExists(rem, w, te);
          });
        };

        const applyEulerVertexHint = () => {
          const ids = computeSuggestedVertices();
          clearSuggestionStars();
          ids.forEach((id) => {
            const g = svg.querySelector(`g.euler-star-node[data-id="${id}"]`);
            if (g) g.classList.add('hint-suggest');
          });
          const guide = document.getElementById('hint-blue-stars-guide');
          if (guide) guide.style.display = ids.length > 0 ? 'block' : 'none';
          return ids;
        };

        const starPath = (cx, cy, outer, inner) => {
          let d = '';
          for (let k = 0; k < 5; k++) {
            const oa = -Math.PI / 2 + k * 2 * Math.PI / 5;
            const ia = -Math.PI / 2 + Math.PI / 5 + k * 2 * Math.PI / 5;
            const ox = cx + outer * Math.cos(oa);
            const oy = cy + outer * Math.sin(oa);
            const ix = cx + inner * Math.cos(ia);
            const iy = cy + inner * Math.sin(ia);
            if (k === 0) d += `M${ox},${oy}`;
            else d += `L${ox},${oy}`;
            d += `L${ix},${iy}`;
          }
          d += 'Z';
          return d;
        };

        const setTracedVisual = (key, traced) => {
          const rec = edgeDomByKey[key];
          if (!rec) return;
          if (traced) {
            rec.orangeAsphalt.classList.remove('euler-edge-untraced');
            rec.orangeAsphalt.classList.add('euler-edge-traced');
          } else {
            rec.orangeAsphalt.classList.add('euler-edge-untraced');
            rec.orangeAsphalt.classList.remove('euler-edge-traced');
          }
        };

        const clearAllTraced = () => {
          [...tracedEdgeKeys].forEach((k) => setTracedVisual(k, false));
          tracedEdgeKeys.clear();
          edgeTraceStack.length = 0;
        };

        const runEulerOneStrokeDemoAnimation = async (shouldContinue) => {
          const demoTrail = [
            [1, 3],
            [3, 5],
            [5, 4],
            [4, 3],
            [3, 2],
            [2, 1],
            [1, 4],
            [4, 2]
          ];
          const clearDemoTrailVisuals = () => {
            demoTrail.forEach(([u, v]) => {
              setTracedVisual(edgeKey(u, v), false);
            });
          };
          while (shouldContinue()) {
            clearSuggestionStars();
            clearDemoTrailVisuals();
            svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
            selectedNodeId = null;
            for (const [u, v] of demoTrail) {
              if (!shouldContinue()) return;
              const k = edgeKey(u, v);
              setTracedVisual(k, true);
              await sleep(450);
            }
            if (!shouldContinue()) return;
            await sleep(1400);
          }
        };

        const showEulerTask1OutcomeFeedback = async (success) => {
          actionLogs.push({ time: Date.now(), action: 'outcome_feedback_shown', success });
          ghostBubble.classList.add('visible');
          ghostUI.style.transform = 'scale(1)';
          ghostButtons.style.flexDirection = 'column';
          if (success) {
            ghostText.innerHTML = 'Din lösning var korrekt.';
            ghostButtons.innerHTML = '<button type="button" id="euler1-feedback-continue" class="ghost-hint-btn">Fortsätt till nästa uppgift</button>';
          } else {
            ghostText.innerHTML = 'Tyvärr hittade du inte rätt lösning.<br>Titta på hur det kan göras.';
            ghostButtons.innerHTML = '<button type="button" id="euler1-feedback-continue" class="ghost-hint-btn">Fortsätt till nästa uppgift</button>';
          }
          return new Promise((resolve) => {
            let keepAnimating = !success;
            if (!success) {
              runEulerOneStrokeDemoAnimation(() => keepAnimating).catch(() => {});
            }
            const btn = document.getElementById('euler1-feedback-continue');
            btn.addEventListener('click', () => {
              actionLogs.push({ time: Date.now(), action: 'outcome_continue_clicked', success });
              keepAnimating = false;
              ghostBubble.classList.remove('euler-self-assessment-wide', 'visible');
              ghostUI.style.transform = 'scale(0.6)';
              resolve();
            }, { once: true });
          });
        };

        const updateNodePosition = (nodeId, x, y) => {
          const nodeObj = nodes.find((n) => n.id === nodeId);
          if (!nodeObj) return;
          nodeObj.x = x;
          nodeObj.y = y;
          const nodeDom = nodeDomById[nodeId];
          if (nodeDom) {
            nodeDom.hit.setAttribute('cx', x);
            nodeDom.hit.setAttribute('cy', y);
            nodeDom.star.setAttribute('d', starPath(x, y, 22, 9));
          }
          edges.forEach((edge) => {
            if (edge.u !== nodeId && edge.v !== nodeId) return;
            const nodeU = nodes.find((n) => n.id === edge.u);
            const nodeV = nodes.find((n) => n.id === edge.v);
            const k = edgeKey(edge.u, edge.v);
            const rec = edgeDomByKey[k];
            if (!rec) return;
            rec.whiteLine.setAttribute('x1', nodeU.x);
            rec.whiteLine.setAttribute('y1', nodeU.y);
            rec.whiteLine.setAttribute('x2', nodeV.x);
            rec.whiteLine.setAttribute('y2', nodeV.y);
            rec.orangeAsphalt.setAttribute('x1', nodeU.x);
            rec.orangeAsphalt.setAttribute('y1', nodeU.y);
            rec.orangeAsphalt.setAttribute('x2', nodeV.x);
            rec.orangeAsphalt.setAttribute('y2', nodeV.y);
          });
        };

        ghostBubble.classList.add('visible');

        document.getElementById('ghost-blocker').addEventListener('click', () => {
          showHintBanner('hint-must-answer');
          actionLogs.push({ time: Date.now(), action: 'click_blocked_task' });
        });
        const blockUntilGhostIntroAnswered = (source) => {
          if (ghostState === 1 || ghostState === 2) {
            showHintBanner('hint-must-answer');

            return true;
          }
          return false;
        };

        const handleGhostAnswer = (answer) => {
          if (ghostState === 1) {

            actionLogs.push({ time: Date.now(), action: 'ghost_q1_answered', answer: logAnswer });
            ghostText.innerHTML = 'Om du behöver en ledtråd, klicka på mig.';
            ghostButtons.innerHTML = `
              <button id="ghost-btn-minimize" style="padding: 10px 15px; border: none; border-radius: 8px; background: #28a745; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">Jag vill börja arbeta.</button>
              <button id="ghost-btn-help-now" style="padding: 10px 15px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;">Jag vill ha en ledtråd.</button>
            `;
            document.getElementById('ghost-btn-minimize').addEventListener('click', () => {
              ghostUI.style.transform = 'scale(0.6)';

        };

        document.getElementById('ghost-btn-yes').addEventListener('click', () => handleGhostAnswer('Ja'));
        document.getElementById('ghost-btn-unknown').addEventListener('click', () => handleGhostAnswer('Jag vet inte'));
        document.getElementById('ghost-btn-no').addEventListener('click', () => handleGhostAnswer('Nej'));

        edges.forEach((edge) => {
          const nodeU = nodes.find((n) => n.id === edge.u);

          const baseGroup = document.createElementNS(svgNS, 'g');
          baseGroup.classList.add('euler-base-edge');
          const whiteLine = document.createElementNS(svgNS, 'line');
          whiteLine.setAttribute('x1', nodeU.x);
          whiteLine.setAttribute('y1', nodeU.y);
          whiteLine.setAttribute('x2', nodeV.x);
          whiteLine.setAttribute('y2', nodeV.y);
          baseGroup.appendChild(whiteLine);
          graphContent.appendChild(baseGroup);
          const k = edgeKey(edge.u, edge.v);
          if (!edgeDomByKey[k]) edgeDomByKey[k] = {};
          edgeDomByKey[k].whiteLine = whiteLine;
        });

        edges.forEach((edge) => {
          const nodeU = nodes.find((n) => n.id === edge.u);
          const nodeV = nodes.find((n) => n.id === edge.v);
          const k = edgeKey(edge.u, edge.v);
          const traceGroup = document.createElementNS(svgNS, 'g');
          traceGroup.classList.add('euler-trace-layer');

          const orangeAsphalt = document.createElementNS(svgNS, 'line');
          orangeAsphalt.setAttribute('x1', nodeU.x);
          orangeAsphalt.setAttribute('y1', nodeU.y);
          orangeAsphalt.setAttribute('x2', nodeV.x);
          orangeAsphalt.setAttribute('y2', nodeV.y);
          orangeAsphalt.setAttribute('stroke', '#ff9f1c');
          orangeAsphalt.setAttribute('stroke-width', '10');
          orangeAsphalt.setAttribute('stroke-linecap', 'round');
          orangeAsphalt.classList.add('euler-edge-untraced');

          traceGroup.appendChild(orangeAsphalt);
          graphContent.appendChild(traceGroup);
          if (!edgeDomByKey[k]) edgeDomByKey[k] = {};
          edgeDomByKey[k].orangeAsphalt = orangeAsphalt;
        });

        nodes.forEach((node) => {
          const group = document.createElementNS(svgNS, 'g');
          group.classList.add('euler-star-node');
          group.dataset.id = String(node.id);

          const hit = document.createElementNS(svgNS, 'circle');
          hit.setAttribute('cx', node.x);
          hit.setAttribute('cy', node.y);
          hit.setAttribute('r', 36);
          hit.classList.add('star-hit');

          const star = document.createElementNS(svgNS, 'path');
          star.setAttribute('d', starPath(node.x, node.y, 22, 9));
          star.classList.add('star-shape');

          group.appendChild(hit);
          group.appendChild(star);
          graphContent.appendChild(group);
          nodeDomById[node.id] = { group, hit, star };

          group.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            draggedNodeId = node.id;
            dragMoved = false;
            dragStartPoint = { x: e.clientX, y: e.clientY };
            e.preventDefault();
          }, { passive: false });

          group.addEventListener('click', () => {
            if (dragMoved) {
              dragMoved = false;
              return;
            }
            hideTaskHints();
            clearSuggestionStars();
            try {
              if (selectedNodeId === null) {
                svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                selectedNodeId = node.id;
                group.classList.add('selected');
                actionLogs.push({ time: Date.now(), action: 'select_star', node: node.id });
                return;
              }
              if (selectedNodeId === node.id) {
                if (tracedEdgeKeys.size === 0) {
                  svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                  selectedNodeId = null;
                  actionLogs.push({ time: Date.now(), action: 'deselect_start_star', node: node.id });
                }
                return;
              }
              const from = selectedNodeId;
              const to = node.id;
              const ek = edgeKey(from, to);
              if (!adjacency.has(ek)) {
                showHintBanner('hint-not-adjacent');
                actionLogs.push({ time: Date.now(), action: 'connect_rejected_no_graph_edge', from, to });
                return;
              }
              if (tracedEdgeKeys.has(ek)) {
                showHintBanner('hint-already-edge');
                actionLogs.push({ time: Date.now(), action: 'connect_rejected_already_traced', from, to });
                return;
              }
              tracedEdgeKeys.add(ek);
              if (tracedEdgeKeys.size === 1) {
                attemptCount += 1;
                actionLogs.push({ time: Date.now(), action: 'attempt_started', attempt_number: attemptCount });
              }
              edgeTraceStack.push({ u: from, v: to, key: ek });
              setTracedVisual(ek, true);
              svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
              selectedNodeId = to;
              group.classList.add('selected');
              actionLogs.push({ time: Date.now(), action: 'trace_edge', from, to, edge_key: ek });
              refreshOneStrokeCompletionStats('trace_edge');
            } finally {
              if (eulerHintFollowThrough) {
                const suggested = applyEulerVertexHint();
                actionLogs.push({
                  time: Date.now(),
                  action: 'euler_hint_follow_refresh',
                  suggested_vertices: suggested
                });
              }
            }
          });
        });

        const onEuler1PointerMove = (e) => {
          if (draggedNodeId === null) return;
          if (Math.abs(e.clientX - dragStartPoint.x) > DRAG_THRESHOLD || Math.abs(e.clientY - dragStartPoint.y) > DRAG_THRESHOLD) {
            dragMoved = true;
          }
          if (!dragMoved) return;
          const pt = svg.createSVGPoint();
          pt.x = e.clientX;
          pt.y = e.clientY;
          const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
          updateNodePosition(draggedNodeId, svgP.x, svgP.y);
        };

        const endEuler1Drag = () => {
          if (draggedNodeId !== null && dragMoved) {
            const movedNode = nodes.find((n) => n.id === draggedNodeId);
            actionLogs.push({
              time: Date.now(),
              action: 'move_star',
              node: draggedNodeId,
              new_x: Math.round(movedNode.x),
              new_y: Math.round(movedNode.y)
            });
          }
          draggedNodeId = null;
        };

        svg.addEventListener('pointermove', onEuler1PointerMove);
        svg.addEventListener('pointerup', endEuler1Drag);
        svg.addEventListener('pointercancel', endEuler1Drag);

        ghostCharacter.addEventListener('click', () => {
          if (eulerSelfAssessmentOpen) return;
          if (ghostState === 1 || ghostState === 2) {
            actionLogs.push({ time: Date.now(), action: 'ghost_clicked_during_intro' });
            ghostBubble.classList.add('visible');
            ghostUI.style.transform = 'scale(1)';
            if (ghostState === 1) ghostButtons.style.flexDirection = 'row';
            return;
          }
          if (ghostState === 3) {
            actionLogs.push({ time: Date.now(), action: 'ghost_clicked_for_hint' });
            ghostText.innerHTML = 'Hur kan jag hjälpa dig?';
            ghostButtons.style.flexDirection = 'column';

        };

        const syncEuler2BlueHintBanner = () => {
          const guide = document.getElementById('hint-blue-stars-guide-e2');
          if (!guide) return;
          const any = !!document.querySelector('#euler2-grid .hint-suggest');
          guide.style.display = any ? 'block' : 'none';
        };

        const edgeKey = (u, v) => (u < v ? `${u}-${v}` : `${v}-${u}`);

        const starPath = (cx, cy, outer, inner) => {
          let d = '';
          for (let k = 0; k < 5; k++) {
            const oa = -Math.PI / 2 + k * 2 * Math.PI / 5;
            const ia = -Math.PI / 2 + Math.PI / 5 + k * 2 * Math.PI / 5;
            const ox = cx + outer * Math.cos(oa);
            const oy = cy + outer * Math.sin(oa);
            const ix = cx + inner * Math.cos(ia);
            const iy = cy + inner * Math.sin(ia);
            if (k === 0) d += `M${ox},${oy}`;
            else d += `L${ox},${oy}`;
            d += `L${ix},${iy}`;
          }
          return d + 'Z';
        };

        const getRemainingEdgesFromUsed = (edgesList, usedKeys) =>
          edgesList.filter((e) => !usedKeys.has(edgeKey(e.u, e.v)));

        const openEulerPathExists = (remEdges, nodesList, from, to) => {
          if (remEdges.length === 0) return from === to;
          const deg = new Map(nodesList.map((n) => [n.id, 0]));
          const withEdge = new Set();
          remEdges.forEach((e) => {
            deg.set(e.u, deg.get(e.u) + 1);
            deg.set(e.v, deg.get(e.v) + 1);
            withEdge.add(e.u);
            withEdge.add(e.v);
          });
          const odds = nodesList.filter((n) => (deg.get(n.id) || 0) % 2 === 1).map((n) => n.id);
          if (odds.length !== 2) return false;
          if (!odds.includes(from) || !odds.includes(to) || from === to) return false;
          const seen = new Set();
          const st = [from];
          while (st.length) {
            const v = st.pop();
            if (seen.has(v)) continue;
            seen.add(v);
            remEdges.forEach((e) => {
              if (e.u === v && !seen.has(e.v)) st.push(e.v);
              if (e.v === v && !seen.has(e.u)) st.push(e.u);
            });
          }
          for (const v of withEdge) if (!seen.has(v)) return false;
          return true;
        };

        const neighborsUnused = (v, edgesList, usedKeys) =>
          edgesList
            .filter((e) => !usedKeys.has(edgeKey(e.u, e.v)) && (e.u === v || e.v === v))
            .map((e) => (e.u === v ? e.v : e.u));

        const fullGraphOddIds = (P) => {
          const deg = new Map(P.nodes.map((n) => [n.id, 0]));
          P.edges.forEach((e) => {
            deg.set(e.u, deg.get(e.u) + 1);
            deg.set(e.v, deg.get(e.v) + 1);
          });
          return P.nodes.filter((n) => deg.get(n.id) % 2 === 1).map((n) => n.id);
        };

        const panels = graphSpecs.map((spec, panelIndex) => ({
          panelIndex,
          label: spec.label,
          nodes: spec.nodes.map((n) => ({ ...n })),
          edges: spec.edges.map((e) => ({ ...e })),
          canOneStroke: spec.canOneStroke,
          tracedEdgeKeys: new Set(),
          edgeTraceStack: [],
          edgeDomByKey: {},
          selectedNodeId: null,
          choice: null,
          svg: null,
          graphContent: null,
          initialNodePositions: new Map(spec.nodes.map((n) => [n.id, { x: n.x, y: n.y }])),
          updateNodePosition: null,
          bYes: null,
          bNo: null
        }));

        const clearSuggestionStarsPanel = (P) => {
          if (!P.svg) return;
          P.svg.querySelectorAll('.euler-star-node.hint-suggest').forEach((g) => g.classList.remove('hint-suggest'));
          syncEuler2BlueHintBanner();
        };

        const computeSuggestedVertices = (P) => {
          const used = P.tracedEdgeKeys;
          const oddsFull = fullGraphOddIds(P);
          const eulerOneStrokePossible = oddsFull.length === 0 || oddsFull.length === 2;
          if (!eulerOneStrokePossible) {
            if (P.edgeTraceStack.length === 0) {
              if (P.selectedNodeId === null) return P.nodes.map((n) => n.id);
              return neighborsUnused(P.selectedNodeId, P.edges, used);
            }
            const currentEnd = P.edgeTraceStack[P.edgeTraceStack.length - 1].v;
            return neighborsUnused(currentEnd, P.edges, used);
          }
          const targetFromStart = (startV) => {
            if (oddsFull.length === 2) return oddsFull[0] === startV ? oddsFull[1] : oddsFull[0];
            if (oddsFull.length === 0) return startV;
            return null;
          };
          if (P.edgeTraceStack.length === 0) {
            if (P.selectedNodeId === null) {
              if (oddsFull.length === 2) return oddsFull.slice();
              if (oddsFull.length === 0) return P.nodes.map((n) => n.id);
              return [];
            }
            const ps = P.selectedNodeId;
            const te = targetFromStart(ps);
            if (te === null) return [];
            return neighborsUnused(ps, P.edges, used).filter((w) => {
              const used2 = new Set(used);
              used2.add(edgeKey(ps, w));
              const rem = getRemainingEdgesFromUsed(P.edges, used2);
              return openEulerPathExists(rem, P.nodes, w, te);
            });
          }
          const pathStartV = P.edgeTraceStack[0].u;
          const te = targetFromStart(pathStartV);
          if (te === null) return [];
          const currentEnd = P.edgeTraceStack[P.edgeTraceStack.length - 1].v;
          return neighborsUnused(currentEnd, P.edges, used).filter((w) => {
            const used2 = new Set(used);
            used2.add(edgeKey(currentEnd, w));
            const rem = getRemainingEdgesFromUsed(P.edges, used2);
            return openEulerPathExists(rem, P.nodes, w, te);
          });
        };

        const applyEulerVertexHintAllPanels = () => {
          const perPanel = [];
          panels.forEach((P, idx) => {
            if (!P.svg) {
              perPanel.push({ panel: idx, suggested_vertices: [] });
              return;
            }
            P.svg.querySelectorAll('.euler-star-node.hint-suggest').forEach((g) => g.classList.remove('hint-suggest'));
            const ids = computeSuggestedVertices(P);
            ids.forEach((id) => {
              const g = P.svg.querySelector(`g.euler-star-node[data-nid="${id}"]`);
              if (g) g.classList.add('hint-suggest');
            });
            perPanel.push({ panel: idx, suggested_vertices: ids });
          });
          syncEuler2BlueHintBanner();
          return perPanel;
        };

        const centerGraphInView = (nodesList, gw, gh) => {
          let mn = Infinity,
            mx = -Infinity,
            myn = Infinity,
            myx = -Infinity;
          nodesList.forEach((n) => {
            mn = Math.min(mn, n.x);
            mx = Math.max(mx, n.x);
            myn = Math.min(myn, n.y);
            myx = Math.max(myx, n.y);
          });
          const cx = (mn + mx) / 2;
          const cy = (myn + myx) / 2;
          return `translate(${gw / 2 - cx},${gh / 2 - cy})`;
        };

        const setTracedVisual = (P, key, traced) => {
          const rec = P.edgeDomByKey[key];
          if (!rec) return;
          if (traced) {
            rec.orangeAsphalt.classList.remove('euler-edge-untraced');
            rec.orangeAsphalt.classList.add('euler-edge-traced');
          } else {
            rec.orangeAsphalt.classList.add('euler-edge-untraced');
            rec.orangeAsphalt.classList.remove('euler-edge-traced');
          }
        };

        const buildPanel = (P) => {
          const i = P.panelIndex;
          const cell = document.createElement('div');
          cell.className = 'euler-task2-cell';
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('viewBox', `0 0 ${vb.w} ${vb.h}`);
          svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
          svg.style.backgroundColor = '#3d7fb3';
          const graphContent = document.createElementNS(svgNS, 'g');
          graphContent.setAttribute('transform', centerGraphInView(P.nodes, vb.w, vb.h));
          svg.appendChild(graphContent);
          P.svg = svg;
          P.graphContent = graphContent;

          const adj = new Set(P.edges.map((e) => edgeKey(e.u, e.v)));
          P.nodeDomById = {};
          P.draggedNodeId = null;
          P.dragMoved = false;
          P.dragStartPoint = { x: 0, y: 0 };
          P.DRAG_THRESHOLD = 3;

          const updatePanelNodePosition = (nodeId, x, y) => {
            const nodeObj = P.nodes.find((n) => n.id === nodeId);
            if (!nodeObj) return;
            nodeObj.x = x;
            nodeObj.y = y;
            const nodeDom = P.nodeDomById[nodeId];
            if (nodeDom) {
              nodeDom.hit.setAttribute('cx', x);
              nodeDom.hit.setAttribute('cy', y);
              nodeDom.star.setAttribute('d', starPath(x, y, 10, 4.2));
            }
            P.edges.forEach((edge) => {
              if (edge.u !== nodeId && edge.v !== nodeId) return;
              const nodeU = P.nodes.find((n) => n.id === edge.u);
              const nodeV = P.nodes.find((n) => n.id === edge.v);
              const k = edgeKey(edge.u, edge.v);
              const rec = P.edgeDomByKey[k];
              if (!rec) return;
              rec.whiteLine.setAttribute('x1', nodeU.x);
              rec.whiteLine.setAttribute('y1', nodeU.y);
              rec.whiteLine.setAttribute('x2', nodeV.x);
              rec.whiteLine.setAttribute('y2', nodeV.y);
              rec.orangeAsphalt.setAttribute('x1', nodeU.x);
              rec.orangeAsphalt.setAttribute('y1', nodeU.y);
              rec.orangeAsphalt.setAttribute('x2', nodeV.x);
              rec.orangeAsphalt.setAttribute('y2', nodeV.y);
            });
          };
          P.updateNodePosition = updatePanelNodePosition;

          P.edges.forEach((edge) => {
            const nodeU = P.nodes.find((n) => n.id === edge.u);
            const nodeV = P.nodes.find((n) => n.id === edge.v);
            const baseGroup = document.createElementNS(svgNS, 'g');
            baseGroup.classList.add('euler-base-edge');
            const wl = document.createElementNS(svgNS, 'line');
            wl.setAttribute('x1', nodeU.x);
            wl.setAttribute('y1', nodeU.y);
            wl.setAttribute('x2', nodeV.x);
            wl.setAttribute('y2', nodeV.y);
            baseGroup.appendChild(wl);
            graphContent.appendChild(baseGroup);
            const k = edgeKey(edge.u, edge.v);
            if (!P.edgeDomByKey[k]) P.edgeDomByKey[k] = {};
            P.edgeDomByKey[k].whiteLine = wl;
          });

          P.edges.forEach((edge) => {
            const nodeU = P.nodes.find((n) => n.id === edge.u);
            const nodeV = P.nodes.find((n) => n.id === edge.v);
            const k = edgeKey(edge.u, edge.v);
            const tg = document.createElementNS(svgNS, 'g');
            tg.classList.add('euler-trace-layer');
            const ol = document.createElementNS(svgNS, 'line');
            ol.setAttribute('x1', nodeU.x);
            ol.setAttribute('y1', nodeU.y);
            ol.setAttribute('x2', nodeV.x);
            ol.setAttribute('y2', nodeV.y);
            ol.setAttribute('stroke', '#ff9f1c');
            ol.setAttribute('stroke-width', '7');
            ol.setAttribute('stroke-linecap', 'round');
            ol.classList.add('euler-edge-untraced');
            tg.appendChild(ol);
            graphContent.appendChild(tg);
            if (!P.edgeDomByKey[k]) P.edgeDomByKey[k] = {};
            P.edgeDomByKey[k].orangeAsphalt = ol;
          });

          P.nodes.forEach((node) => {
            const group = document.createElementNS(svgNS, 'g');
            group.classList.add('euler-star-node');
            group.dataset.nid = String(node.id);
            const hit = document.createElementNS(svgNS, 'circle');
            hit.setAttribute('cx', node.x);
            hit.setAttribute('cy', node.y);
            hit.setAttribute('r', 16);
            hit.classList.add('star-hit');
            const star = document.createElementNS(svgNS, 'path');
            star.setAttribute('d', starPath(node.x, node.y, 10, 4.2));
            star.classList.add('star-shape');
            group.appendChild(hit);
            group.appendChild(star);
            graphContent.appendChild(group);
            P.nodeDomById[node.id] = { group, hit, star };

            group.addEventListener('pointerdown', (e) => {
              if (e.pointerType === 'mouse' && e.button !== 0) return;
              P.draggedNodeId = node.id;
              P.dragMoved = false;
              P.dragStartPoint = { x: e.clientX, y: e.clientY };
              e.preventDefault();
            }, { passive: false });

            group.addEventListener('click', () => {
              if (P.dragMoved) {
                P.dragMoved = false;
                return;
              }
              lastActivePanel = i;
              hideTaskHints();
              panels.forEach((Px) => clearSuggestionStarsPanel(Px));
              try {
                if (P.selectedNodeId === null) {
                  P.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                  P.selectedNodeId = node.id;
                  group.classList.add('selected');
                  actionLogs.push({ time: Date.now(), action: 'euler2_select_star', panel: i, node: node.id });
                  return;
                }
                if (P.selectedNodeId === node.id) {
                  if (traceUndoGlobal.length === 0) {
                    P.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                    P.selectedNodeId = null;
                    actionLogs.push({ time: Date.now(), action: 'euler2_deselect_start_star', panel: i, node: node.id });
                  }
                  return;
                }
                const from = P.selectedNodeId;
                const to = node.id;
                const ek = edgeKey(from, to);
                if (!adj.has(ek)) {
                  showHintBanner('hint-not-adjacent-e2');
                  actionLogs.push({ time: Date.now(), action: 'euler2_reject_no_edge', panel: i, from, to });
                  return;
                }
                if (P.tracedEdgeKeys.has(ek)) {
                  showHintBanner('hint-already-edge-e2');
                  actionLogs.push({ time: Date.now(), action: 'euler2_reject_already', panel: i, from, to });
                  return;
                }
                P.tracedEdgeKeys.add(ek);
                P.edgeTraceStack.push({ u: from, v: to, key: ek });
                traceUndoGlobal.push({ panelIndex: i, key: ek, u: from, v: to });
                setTracedVisual(P, ek, true);
                P.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                P.selectedNodeId = to;
                group.classList.add('selected');
                actionLogs.push({ time: Date.now(), action: 'euler2_trace_edge', panel: i, from, to, edge_key: ek });
              } finally {
                if (eulerHintFollowThrough) {
                  const suggested = applyEulerVertexHintAllPanels();
                  actionLogs.push({ time: Date.now(), action: 'euler_hint_follow_refresh', panel: lastActivePanel, suggested_per_panel: suggested });
                }
              }
            });
          });

          svg.addEventListener('pointermove', (e) => {
            if (P.draggedNodeId === null) return;
            if (
              Math.abs(e.clientX - P.dragStartPoint.x) > P.DRAG_THRESHOLD ||
              Math.abs(e.clientY - P.dragStartPoint.y) > P.DRAG_THRESHOLD
            ) {
              P.dragMoved = true;
            }
            if (!P.dragMoved) return;
            const pt = svg.createSVGPoint();
            pt.x = e.clientX;
            pt.y = e.clientY;
            const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
            updatePanelNodePosition(P.draggedNodeId, svgP.x, svgP.y);
          });

          const endEuler2PanelDrag = () => {
            if (P.draggedNodeId !== null && P.dragMoved) {
              const movedNode = P.nodes.find((n) => n.id === P.draggedNodeId);
              actionLogs.push({
                time: Date.now(),
                action: 'euler2_move_star',
                panel: i,
                node: P.draggedNodeId,
                new_x: Math.round(movedNode.x),
                new_y: Math.round(movedNode.y)
              });
            }
            P.draggedNodeId = null;
          };

          svg.addEventListener('pointerup', endEuler2PanelDrag);
          svg.addEventListener('pointercancel', endEuler2PanelDrag);

          const yn = document.createElement('div');
          yn.className = 'euler2-yesno';
          const bYes = document.createElement('button');
          bYes.type = 'button';
          bYes.textContent = 'Ja';
          const bNo = document.createElement('button');
          bNo.type = 'button';
          bNo.textContent = 'Nej';
          P.bYes = bYes;
          P.bNo = bNo;

          const setChoice = (val) => {
            const prev = P.choice;
            P.choice = val;
            const choiceHint = document.getElementById('hint-choice-required-e2');
            if (choiceHint) choiceHint.style.display = 'none';
            bYes.classList.toggle('euler2-btn-on', val === 'muzu');
            bNo.classList.toggle('euler2-btn-on', val === 'nemuzu');
            const ok = (val === 'muzu' && P.canOneStroke) || (val === 'nemuzu' && !P.canOneStroke);
            actionLogs.push({
              time: Date.now(),
              action: 'euler2_panel_yesno',
              panel: i,
              choice: val,
              previous_choice: prev,
              unchanged: prev === val,
              is_correct: ok,
              can_one_stroke: P.canOneStroke
            });
          };
          bYes.addEventListener('click', () => setChoice('muzu'));
          bNo.addEventListener('click', () => setChoice('nemuzu'));

          yn.appendChild(bYes);
          yn.appendChild(bNo);
          const cap = document.createElement('div');
          cap.className = 'euler-task2-caption';
          cap.textContent = 'rita bilden med ett enda drag.';
          const correctionNote = document.createElement('div');
          correctionNote.className = 'euler2-correction-note';
          P.correctionNote = correctionNote;
          P.cell = cell;
          cell.appendChild(svg);
          cell.appendChild(yn);
          cell.appendChild(cap);
          cell.appendChild(correctionNote);
          document.getElementById('euler2-grid').appendChild(cell);
        };

        panels.forEach((P) => buildPanel(P));

        ghostCharacter.addEventListener('click', () => {
          if (euler2SelfAssessmentOpen) return;
          if (ghostState === 3) {
            actionLogs.push({ time: Date.now(), action: 'ghost_clicked_for_hint' });
            ghostText.innerHTML = 'Hur kan jag hjälpa dig?';
            ghostButtons.style.flexDirection = 'column';
            ghostButtons.innerHTML = `
              <button type="button" id="hint-stars-e2" class="ghost-hint-btn">Jag vet inte hur jag ska börja rita.</button>
              <button type="button" id="hint-understand-e2" class="ghost-hint-btn">Jag kan inte rita bilden med en linje, jag behöver hjälp.</button>
              <button type="button" id="ghost-hint-close-e2" class="ghost-hint-btn" style="background: #6c757d;">Stäng ledtråd</button>
            `;
            ghostBubble.classList.add('visible');
            ghostUI.style.transform = 'scale(1)';
            document.getElementById('hint-stars-e2').addEventListener('click', () => {
              hideTaskHints();
              showHintBanner('hint-how-stars-e2');
              ghostBubble.classList.remove('visible');
              ghostUI.style.transform = 'scale(0.6)';
              actionLogs.push({ time: Date.now(), action: 'ghost_hint_how_connect_stars' });
            });
            document.getElementById('hint-understand-e2').addEventListener('click', () => {
              hideTaskHints();
              eulerHintFollowThrough = true;
              const suggested = applyEulerVertexHintAllPanels();
              ghostBubble.classList.remove('visible');
              ghostUI.style.transform = 'scale(0.6)';
              actionLogs.push({ time: Date.now(), action: 'ghost_hint_euler_vertices_all_panels', suggested_per_panel: suggested, follow_through_enabled: true });
            });
            document.getElementById('ghost-hint-close-e2').addEventListener('click', () => {
              ghostBubble.classList.remove('visible');
              ghostUI.style.transform = 'scale(0.6)';
              actionLogs.push({ time: Date.now(), action: 'ghost_hint_closed' });
            });
          }
        });

        document.getElementById('btn-hide-hint-e2').addEventListener('click', () => {
          hideTaskHints();
          eulerHintFollowThrough = false;
          panels.forEach((P) => clearSuggestionStarsPanel(P));
          actionLogs.push({ time: Date.now(), action: 'hide_hint' });
        });

        document.getElementById('btn-undo-e2').addEventListener('click', () => {
          hideTaskHints();
          const last = traceUndoGlobal.pop();
          if (!last) {
            if (traceUndoGlobal.length === 0) {
              let clearedAnySelection = false;
              panels.forEach((Px, panelIndex) => {
                if (Px.selectedNodeId !== null) {
                  const previouslySelected = Px.selectedNodeId;
                  Px.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
                  Px.selectedNodeId = null;
                  actionLogs.push({
                    time: Date.now(),
                    action: 'euler2_undo_cleared_selected_star',
                    panel: panelIndex,
                    node: previouslySelected
                  });
                  clearedAnySelection = true;
                }
              });
              if (clearedAnySelection) return;
            }
            showHintBanner('hint-undo-empty-e2');
            actionLogs.push({ time: Date.now(), action: 'undo_no_edge' });
            return;
          }
          const P = panels[last.panelIndex];
          clearSuggestionStarsPanel(P);
          P.tracedEdgeKeys.delete(last.key);
          const ix = P.edgeTraceStack.findIndex((e) => e.key === last.key);
          if (ix !== -1) P.edgeTraceStack.splice(ix, 1);
          setTracedVisual(P, last.key, false);
          P.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
          P.selectedNodeId = last.u;
          const g = P.svg.querySelector(`g.euler-star-node[data-nid="${last.u}"]`);
          if (g) g.classList.add('selected');
          actionLogs.push({ time: Date.now(), action: 'undo_last_edge', panel: last.panelIndex, removed_key: last.key });
          if (eulerHintFollowThrough) {
            lastActivePanel = last.panelIndex;
            const suggested = applyEulerVertexHintAllPanels();
            actionLogs.push({ time: Date.now(), action: 'euler_hint_follow_refresh', panel: lastActivePanel, suggested_per_panel: suggested, after: 'undo' });
          }
        });

        document.getElementById('btn-restart-e2').addEventListener('click', () => {
          hideTaskHints();
          const hadAny = panels.some((P) => P.tracedEdgeKeys.size > 0);
          const hadAnyMovedNode = panels.some((P) =>
            P.nodes.some((n) => {
              const initial = P.initialNodePositions.get(n.id);
              if (!initial) return false;
              return Math.abs(n.x - initial.x) > 0.001 || Math.abs(n.y - initial.y) > 0.001;
            })
          );
          if (!hadAny && !hadAnyMovedNode) {
            showHintBanner('hint-undo-empty-e2');
            actionLogs.push({ time: Date.now(), action: 'restart_rejected_no_edges' });
            return;
          }
          panels.forEach((P) => {
            [...P.tracedEdgeKeys].forEach((k) => setTracedVisual(P, k, false));
            P.tracedEdgeKeys.clear();
            P.edgeTraceStack.length = 0;
            clearSuggestionStarsPanel(P);
            P.svg.querySelectorAll('.euler-star-node').forEach((n) => n.classList.remove('selected'));
            P.selectedNodeId = null;
            P.nodes.forEach((n) => {
              const initial = P.initialNodePositions.get(n.id);
              if (!initial || !P.updateNodePosition) return;
              P.updateNodePosition(n.id, initial.x, initial.y);
            });
          });
          traceUndoGlobal.length = 0;
          eulerHintFollowThrough = false;
          actionLogs.push({ time: Date.now(), action: 'restart_cleared_all_edges_all_panels', reset_positions: true });
        });

        const showEulerTask2OutcomeFeedback = async (panelAnswers) => {
          const correctCount = panelAnswers.filter((p) => p.is_correct === true).length;
          actionLogs.push({ time: Date.now(), action: 'outcome_feedback_shown', correct_count: correctCount });
          panelAnswers.forEach((answer) => {
            const P = panels[answer.panel];
            if (!P || !P.cell) return;
            P.cell.classList.remove('euler2-cell-correct', 'euler2-cell-wrong');
            if (P.correctionNote) {
              P.correctionNote.style.display = 'none';
              P.correctionNote.textContent = '';
            }

      on_load: () => {

        const edgeKey = (a, b) => (a < b ? `${a}-${b}` : `${b}-${a}`);
        const starPath = (cx, cy, outer, inner) => {

            const ia = -Math.PI / 2 + Math.PI / 5 + k * 2 * Math.PI / 5;

          const minY = Math.min(...ys);
          const maxY = Math.max(...ys);
          const rw = maxX - minX || 1;
          const rh = maxY - minY || 1;
          const scale = Math.min((canvas.width - 2 * pad) / rw, (canvas.height - 2 * pad) / rh);
          const drawnW = rw * scale;
          const drawnH = rh * scale;
          const offsetX = (canvas.width - drawnW) / 2;
          const offsetY = (canvas.height - drawnH) / 2;
          return rawNodes.map((r) => ({
            id: r.id,
            x: offsetX + (r.x - minX) * scale,
            y: offsetY + (maxY - r.y) * scale
          }));

            deg[e.to] = (deg[e.to] || 0) + 1;
          });

          const active = nodes.filter((n) => (deg[n.id] || 0) > 0).map((n) => n.id);
          const odd = Object.values(deg).filter((d) => d % 2 !== 0).length;
          if (active.length === 0) return { oddCount: odd, possible: false };
          const visited = new Set();
          const q = [active[0]];
          while (q.length) {
            const cur = q.shift();
            if (visited.has(cur)) continue;
            visited.add(cur);
            edges.forEach((e) => {
              if (e.from === cur && !visited.has(e.to)) q.push(e.to);
              if (e.to === cur && !visited.has(e.from)) q.push(e.from);
            });
          }
          const connected = active.every((id) => visited.has(id));
          return {
            oddCount: odd,
            possible: isolated === 0 && connected && (odd === 0 || odd === 2)
          };
        };
        const diffSize = (currentEdges, initialEdges) => {
          const a = new Set(currentEdges.map((e) => edgeKey(e.from, e.to)));

        };
        const setupPanel = ({ canvasId, undoId, resetId, statusId, undoEmptyHintId, resetEmptyHintId, rawNodes, baseEdges, requiredDiff, isOneStrokeMode, hideOneStrokeBannerOnFirstNodeClick, panelKey }) => {

          let edges = baseEdges.map((e) => ({ from: e.from, to: e.to }));
          const baseEdgeSet = new Set(baseEdges.map((e) => edgeKey(e.from, e.to)));
          let selectedNodeId = null;
          let pointerDownNodeId = null;
          let history = [JSON.parse(JSON.stringify(edges))];
          let highlightedAddedEdges = new Set();
          let showBlueOddHint = false;

            nodes.forEach((n) => { d[n.id] = 0; });

            });
            return d;
          };
          const draw = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3d7fb3';

            ctx.lineCap = 'round';

          const getCoords = (ev) => {

      on_load: () => {

          return {

          };
        };

        let nodes = [];
        let edges = [];
        let selectedNodeId = null;
        let pointerDownNodeId = null;

        let evaluation = null;
        let selfAssessment = null;

        const hideEuler4GhostBanners = () => {

            let msg = '';
            suggestedAddEdges = new Set();

        };

        const saveState = () => {
          history.push({
            nodes: JSON.parse(JSON.stringify(nodes)),

          });
        };
        const nodeDegreeMap = () => {
          const d = {};
          nodes.forEach((n) => { d[n.id] = 0; });
          edges.forEach((e) => {
            d[e.from] = (d[e.from] || 0) + 1;

        };
        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#3d7fb3';

          ctx.lineCap = 'round';
          const degMap = nodeDegreeMap();
          const existingEdgeKeys = new Set(edges.map((e) => edgeKey(e.from, e.to)));
          edges.forEach((edge) => {
            const a = nodes.find((n) => n.id === edge.from);

            if (!a || !b) return;
            const ek = edgeKey(edge.from, edge.to);
            ctx.beginPath();
            ctx.strokeStyle = suggestedRemoveEdges.has(ek) ? '#dc3545' : (suggestedAddEdges.has(ek) ? '#28a745' : '#ffffff');
            ctx.lineWidth = 7;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);

          });
          euler4OneStrokeTracedEdges.forEach((edge) => {
            const a = nodes.find((n) => n.id === edge.from);
            const b = nodes.find((n) => n.id === edge.to);
            if (!a || !b) return;
            ctx.beginPath();
            ctx.strokeStyle = '#ff9f1c';

            ctx.lineTo(b.x, b.y);

            const parts = ek.split('-');
            if (parts.length !== 2) return;
            const from = Number(parts[0]);
            const to = Number(parts[1]);
            const a = nodes.find((n) => n.id === from);
            const b = nodes.find((n) => n.id === to);
            if (!a || !b) return;
            ctx.beginPath();
            ctx.strokeStyle = '#28a745';
            ctx.lineWidth = 7;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();

          nodes.forEach((node) => {
            const path = new Path2D(starPath(node.x, node.y, 23, 10));

            ctx.fillStyle = blueHint ? '#a8d8ff' : '#ffd54f';
            ctx.strokeStyle = blueHint ? '#5aa9e6' : '#b8860b';
            ctx.lineWidth = 2;
            ctx.fill(path);
            ctx.stroke(path);
            if (selectedNodeId === node.id) {
              ctx.strokeStyle = '#ff8c00';
              ctx.lineWidth = 5;
              ctx.stroke(path);

            if (euler4OneStrokeSelectedNodeId === node.id) {

              ctx.lineWidth = 5;
              ctx.stroke(path);
            }
          });
        };
        const getCoords = (ev) => {
          const rect = canvas.getBoundingClientRect();

            x: (ev.clientX - rect.left) * (canvas.width / rect.width),
            y: (ev.clientY - rect.top) * (canvas.height / rect.height)
          };
        };
        const getNodeAt = (x, y) => nodes.find((n) => Math.hypot(n.x - x, n.y - y) <= NODE_HIT_RADIUS) || null;
        const hideEuler4NoStarHint = () => {

          if (el) el.style.display = 'none';
        };
        const toggleEdge = (a, b) => {
          const ek = edgeKey(a, b);

          if (idx >= 0) {

            edges.push({ from: a, to: b });

          suggestedAddEdges = new Set();
          suggestedRemoveEdges = new Set();
          saveState();
          hideEuler4NoStarHint();
          clearBlueVertexHint();
          euler4OneStrokeSelectedNodeId = null;
          euler4OneStrokeTracedEdges = [];

        };

        const updateNodePosition = (nodeId, x, y) => {
